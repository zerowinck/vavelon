<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синонимы — кроссворд</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0c0c15 0%, #1a1a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background-color: #1e1e2f;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 8px 16px rgba(0, 0, 0, 0.6);
            padding: 32px 28px;
            border: 1px solid #4a3f6e;
            color: #e0e0f0;
        }

        .screen {
            transition: opacity 0.2s ease;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #c0c0ff;
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            color: #b0b0f0;
            margin-bottom: 24px;
            font-size: 1.8rem;
            text-align: center;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: stretch;
        }

        .mode-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background-color: #3a3a5a;
            border: none;
            border-radius: 40px;
            padding: 16px 32px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #f0f0ff;
            cursor: pointer;
            box-shadow: 0 5px 0 #1a1a30;
            transition: all 0.08s linear;
            border: 1px solid #6a5a8a;
            flex: 1 1 auto;
            min-width: 200px;
        }

        .mode-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a30;
        }

        .menu-btn {
            background-color: #3a3a5a;
            border: none;
            border-radius: 60px;
            padding: 22px 20px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #f0f0ff;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a1a30, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.08s linear;
            border: 1px solid #6a5a8a;
            letter-spacing: 1px;
        }

        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1a1a30, 0 8px 16px rgba(0,0,0,0.4);
        }

        .menu-btn.old {
            background-color: #4a3f6e;
            box-shadow: 0 8px 0 #2a1f4a;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .back-btn {
            background-color: #3a3a5a;
            border: none;
            color: #e0e0ff;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a1a30;
            transition: 0.05s linear;
            border: 1px solid #5a4a7a;
        }

        .back-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1a1a30;
        }

        .counter {
            background-color: #2a2a40;
            color: #c0c0f0;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 40px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            border: 1px solid #5a4a7a;
        }

        .sentence-box {
            background-color: #2a2a42;
            border-radius: 32px;
            padding: 32px 28px;
            margin-bottom: 32px;
            font-size: 1.9rem;
            color: #f0f0ff;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid #5a4a7a;
            font-style: italic;
            word-break: break-word;
            line-height: 1.5;
        }

        .sentence-box strong {
            background-color: #4a3f7a;
            color: #ffffff;
            padding: 0 12px;
            border-radius: 40px;
            font-weight: 700;
            font-style: normal;
            box-shadow: 0 4px 0 #1a1f3a;
            border: 1px solid #8a7ab0;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 32px;
        }

        .option-btn {
            background-color: #2a2a42;
            border: 2px solid #5a4a7a;
            color: #e0e0ff;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 22px 8px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1a1a30, 0 6px 14px rgba(0,0,0,0.5);
            transition: all 0.06s;
            line-height: 1.2;
            word-break: break-word;
        }

        .option-btn:not(:disabled):active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a30, 0 6px 14px rgba(0,0,0,0.4);
        }

        .option-btn:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            box-shadow: 0 2px 0 #1a1a30;
            transform: translateY(3px);
            cursor: not-allowed;
            background-color: #1a1a30;
            border-color: #3a2a5a;
        }

        /* Стили для кроссворда */
        .crossword-layout {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* Сетка кроссворда (только клетки для букв) */
        .crossword-words {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: transparent;
            padding: 10px;
        }

        .word-row {
            display: flex;
            gap: 4px;
        }

        .crossword-cell {
            width: 60px;
            height: 60px;
            background-color: white;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Arial', sans-serif;
        }

        .crossword-cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            outline: none;
            border-radius: 6px;
        }

        .crossword-cell input:focus {
            background-color: #e0f0fa;
            box-shadow: 0 0 0 2px #3498db;
        }

        .crossword-cell.highlight {
            background-color: #fffacd;
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.8rem;
            color: #2c3e50;
            font-weight: bold;
            pointer-events: none;
            z-index: 2;
        }

        /* Панель вопросов справа */
        .clues-panel {
            min-width: 300px;
            max-width: 350px;
            background-color: #f8f4e8;
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #4a3f6e;
            color: #2c2c2c;
            font-family: 'Courier New', monospace;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.1);
        }

        .clue-item {
            margin-bottom: 12px;
            padding: 12px;
            background-color: #fff;
            border: 1px solid #aaa;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
        }

        .clue-item:hover {
            background-color: #e0e8f0;
        }

        .clue-item.active {
            background-color: #c0d0f0;
            border: 2px solid #2c3e50;
        }

        .clue-number {
            background-color: #2c3e50;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .clue-text {
            flex: 1;
            color: #1a1a2a;
            line-height: 1.3;
        }

        .crossword-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .crossword-btn {
            background-color: #4a3f7a;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1a1a40;
            transition: 0.05s;
            border: 1px solid #8a7ab0;
            min-width: 160px;
        }

        .crossword-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a40;
        }

        .crossword-info {
            background-color: #f8f4e8;
            border-left: 10px solid #4a3f7a;
            border-radius: 24px;
            padding: 20px;
            color: #1a1a2a;
            font-size: 1.2rem;
            line-height: 1.5;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 16px;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        .hint-btn {
            background-color: #3a3a5a;
            border: none;
            color: #e0e0ff;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a1a30;
            margin-bottom: 24px;
            transition: 0.05s;
            border: 1px solid #6a5a8a;
        }

        .hint-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #1a1a30;
        }

        .info-box {
            background-color: #2a2a42;
            border-left: 10px solid #6a4aaa;
            border-radius: 36px;
            padding: 28px 24px;
            color: #e0e0ff;
            font-size: 1.25rem;
            line-height: 1.5;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 8px 16px rgba(0,0,0,0.3);
            margin-bottom: 24px;
            min-height: 120px;
            border-right: 1px solid #5a4a7a;
        }

        .next-btn {
            background-color: #4a3f7a;
            border: none;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 20px 0;
            width: 100%;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 7px 0 #1a1a40;
            transition: 0.05s;
            border: 1px solid #8a7ab0;
        }

        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1a1a40;
        }

        .finish-message {
            text-align: center;
            background: #2a2a42;
            border-radius: 40px;
            padding: 30px;
            font-size: 2rem;
            color: #e0e0ff;
            font-weight: 600;
            margin-top: 20px;
            border: 2px solid #5a4a7a;
        }

        @media (max-width: 800px) {
            .crossword-cell {
                width: 45px;
                height: 45px;
            }
            .crossword-cell input {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран меню (выбор категории) -->
        <div id="menu-screen" class="screen">
            <h1>✧ игра синонимов ✧</h1>
            <div class="menu-buttons">
                <button class="menu-btn" id="btn-young">💬 молодёжные</button>
                <button class="menu-btn old" id="btn-simple">🔤 простые</button>
            </div>
        </div>

        <!-- Экран выбора режима -->
        <div id="mode-screen" class="screen hidden">
            <h2 id="mode-category-title">Молодёжные</h2>
            <div class="mode-buttons">
                <button class="mode-btn" id="btn-mode-classic">🎮 Классическая</button>
                <button class="mode-btn" id="btn-mode-crossword">🔤 Кроссворд</button>
            </div>
            <button class="back-btn" id="btn-back-from-mode" style="width: 100%; margin-top: 20px;">← к категориям</button>
        </div>

        <!-- Экран классической игры -->
        <div id="game-screen" class="screen hidden">
            <div class="header">
                <button class="back-btn" id="btn-back-from-game">← назад</button>
                <span class="counter" id="question-counter">1 / 20</span>
            </div>
            <div id="sentence-box" class="sentence-box">Загрузка...</div>
            <div id="options-container" class="options"></div>
            <button class="hint-btn" id="btn-hint">💡 подсказка</button>
            <div id="info-box" class="info-box">👆 выбери обычное слово</div>
            <button id="btn-next" class="next-btn hidden">➡️ дальше</button>
        </div>

        <!-- Экран кроссворда -->
        <div id="crossword-screen" class="screen hidden">
            <div class="header">
                <button class="back-btn" id="btn-back-from-crossword">← назад</button>
                <span class="counter">кроссворд</span>
            </div>
            
            <div class="crossword-layout">
                <!-- Сетка со словами (только клетки для букв) -->
                <div class="crossword-words" id="crossword-words"></div>
                
                <!-- Панель вопросов справа (без заголовка) -->
                <div class="clues-panel" id="clues-panel">
                    <div id="clues-list"></div>
                </div>
            </div>
            
            <div class="crossword-actions">
                <button class="crossword-btn" id="btn-check-crossword">✅ проверить</button>
                <button class="crossword-btn" id="btn-clear-crossword">🔄 очистить</button>
                <button class="crossword-btn" id="btn-hint-crossword">💡 подсказка</button>
            </div>
            
            <div id="crossword-info" class="crossword-info">✏️ Вводи буквы — курсор переходит сам</div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------- КЛАССИЧЕСКАЯ ИГРА (20 вопросов в каждой категории) ---------------------
            const classicData = {
                young: [
                    { slang: 'имба', sentence: 'Новый фильм Марвела — просто <strong>имба</strong>, все в восторге!', correct: 'крутой', correctInfo: 'Крутой — значит превосходный, впечатляющий, вызывающий восхищение.', incorrect: ['скучный', 'грустный', 'нормальный'], hint: 'слово для крутого' },
                    { slang: 'кринжово', sentence: 'Когда учитель начал танцевать, мне стало так <strong>кринжово</strong>, что я закрыл лицо.', correct: 'неловко', correctInfo: 'Неловко — ощущение стыда или смущения за другого человека.', incorrect: ['смешно', 'странно', 'обычно'], hint: 'чувство неловкости, стыда' },
                    { slang: 'топ', sentence: 'Этот трек уже месяц в моём плейлисте — он просто <strong>топ</strong>!', correct: 'отличный', correctInfo: 'Отличный — очень хороший, превосходный.', incorrect: ['плохой', 'ужасный', 'так себе'], hint: 'высшая оценка' },
                    { slang: 'хайп', sentence: 'Вокруг выхода новой игры такой <strong>хайп</strong>, что её уже неделю обсуждают.', correct: 'шум', correctInfo: 'Шум — оживлённое обсуждение, ажиотаж.', incorrect: ['тишина', 'покой', 'скандал'], hint: 'много обсуждений' },
                    { slang: 'зашквар', sentence: 'Опоздать на собственную свадьбу — это полный <strong>зашквар</strong>.', correct: 'позор', correctInfo: 'Позор — стыдная ситуация, вызывающая осуждение.', incorrect: ['гордость', 'удача', 'крутость'], hint: 'стыдная ситуация' },
                    { slang: 'рофл', sentence: 'Мы просто <strong>рофлили</strong> над мемасами весь вечер.', correct: 'шутили', correctInfo: 'Шутили — веселились, смеялись, подшучивали.', incorrect: ['плакали', 'молчали', 'злились'], hint: 'веселились' },
                    { slang: 'краш', sentence: 'Она уже год <strong>моя</strong> краш, но я боюсь признаться.', correct: 'любовь', correctInfo: 'Любовь — сильное чувство привязанности, объект обожания.', incorrect: ['ненависть', 'дружба', 'встреча'], hint: 'объект обожания' },
                    { slang: 'вайб', sentence: 'В этом кафе очень уютный <strong>вайб</strong>, хочется сидеть вечно.', correct: 'атмосфера', correctInfo: 'Атмосфера — окружающая обстановка, настроение места.', incorrect: ['скука', 'тоска', 'грязь'], hint: 'настроение, обстановка' },
                    { slang: 'агриться', sentence: 'Не надо <strong>агриться</strong> из-за пустяков, это всего лишь игра.', correct: 'злиться', correctInfo: 'Злиться — испытывать гнев, раздражение.', incorrect: ['радоваться', 'смеяться', 'прыгать'], hint: 'проявлять агрессию' },
                    { slang: 'чиллить', sentence: 'В выходные планирую просто <strong>чиллить</strong> дома с пиццей.', correct: 'отдыхать', correctInfo: 'Отдыхать — расслабляться, ничем не заниматься.', incorrect: ['работать', 'бегать', 'кричать'], hint: 'расслабляться' },
                    { slang: 'пруф', sentence: 'Ты обещал, но где <strong>пруфы</strong>? Я не верю на слово.', correct: 'доказательства', correctInfo: 'Доказательства — факты, подтверждающие истинность.', incorrect: ['обещания', 'фото', 'слова'], hint: 'подтверждение, улики' },
                    { slang: 'токсик', sentence: 'Он постоянно критикует всех, настоящий <strong>токсик</strong>.', correct: 'вредный', correctInfo: 'Вредный — отравляющий общение, вызывающий негатив.', incorrect: ['добрый', 'весёлый', 'умный'], hint: 'человек, отравляющий общение' },
                    { slang: 'изи', sentence: 'Это задание было просто <strong>изи</strong>, я справился за минуту.', correct: 'легко', correctInfo: 'Легко — без усилий, просто.', incorrect: ['трудно', 'сложно', 'невозможно'], hint: 'без усилий' },
                    { slang: 'залипать', sentence: 'Я могу часами <strong>залипать</strong> в ТикТоке.', correct: 'зависать', correctInfo: 'Зависать — проводить время без пользы, увлекаться чем-то.', incorrect: ['работать', 'бегать', 'читать'], hint: 'проводить время без пользы' },
                    { slang: 'флексить', sentence: 'Он любит <strong>флексить</strong> перед зеркалом.', correct: 'хвастаться', correctInfo: 'Хвастаться — показывать своё превосходство, выставлять напоказ.', incorrect: ['стесняться', 'прятать', 'молчать'], hint: 'демонстрировать себя' },
                    { slang: 'го', sentence: '<strong>Го</strong> в кино сегодня вечером?', correct: 'пойдём', correctInfo: 'Пойдём — приглашение к действию.', incorrect: ['останемся', 'поспим', 'поработаем'], hint: 'призыв идти' },
                    { slang: 'байт', sentence: 'Этот вопрос — чистый <strong>байт</strong> на скандал.', correct: 'провокация', correctInfo: 'Провокация — действие, вызывающее реакцию.', incorrect: ['шутка', 'правда', 'ложь'], hint: 'ловушка для эмоций' },
                    { slang: 'кек', sentence: 'Он сказал глупость, я ответил просто <strong>кек</strong>.', correct: 'смешок', correctInfo: 'Смешок — ироничный смех.', incorrect: ['крик', 'плач', 'шепот'], hint: 'усмешка' },
                    { slang: 'лол', sentence: '<strong>Лол</strong>, это было неожиданно!', correct: 'смешно', correctInfo: 'Смешно — выражение смеха.', incorrect: ['грустно', 'страшно', 'скучно'], hint: 'интернет-смех' },
                    { slang: 'хейтить', sentence: 'Не надо <strong>хейтить</strong> новичков.', correct: 'ненавидеть', correctInfo: 'Ненавидеть — испытывать неприязнь.', incorrect: ['любить', 'жалеть', 'уважать'], hint: 'проявлять агрессию' }
                ],
                simple: [
                    { slang: 'прикольный', sentence: 'У него очень <strong>прикольный</strong> стиль одежды.', correct: 'забавный', correctInfo: 'Забавный — вызывающий интерес, необычный.', incorrect: ['скучный', 'страшный', 'обычный'], hint: 'интересный, забавный' },
                    { slang: 'забавно', sentence: 'Было очень <strong>забавно</strong> наблюдать за щенками.', correct: 'смешно', correctInfo: 'Смешно — вызывает улыбку, радость.', incorrect: ['грустно', 'обидно', 'больно'], hint: 'вызывает смех' },
                    { slang: 'классно', sentence: 'Мы <strong>классно</strong> провели выходные на природе.', correct: 'отлично', correctInfo: 'Отлично — очень хорошо, замечательно.', incorrect: ['плохо', 'ужасно', 'скучно'], hint: 'очень хорошо' },
                    { slang: 'симпатичный', sentence: 'Какой <strong>симпатичный</strong> пёс!', correct: 'милый', correctInfo: 'Милый — приятный на вид, вызывающий симпатию.', incorrect: ['страшный', 'противный', 'злой'], hint: 'приятный внешне' },
                    { slang: 'удивительно', sentence: '<strong>Удивительно</strong>, но он пришёл вовремя.', correct: 'неожиданно', correctInfo: 'Неожиданно — вызывает удивление, не предполагалось.', incorrect: ['ожидаемо', 'скучно', 'обычно'], hint: 'вызывает удивление' },

                    { slang: 'чудесный', sentence: 'Какой <strong>чудесный</strong> день!', correct: 'прекрасный', correctInfo: 'Прекрасный — очень хороший, замечательный.', incorrect: ['плохой', 'дождливый', 'серый'], hint: 'очень хороший' },
                    { slang: 'замечательно', sentence: 'Ты <strong>замечательно</strong> справился с заданием.', correct: 'отлично', correctInfo: 'Отлично — очень хорошо.', incorrect: ['плохо', 'ужасно', 'небрежно'], hint: 'очень хорошо' },
                    { slang: 'интересно', sentence: 'Мне было <strong>интересно</strong> слушать его рассказ.', correct: 'увлекательно', correctInfo: 'Увлекательно — захватывающе, занимательно.', incorrect: ['скучно', 'тоскливо', 'обычно'], hint: 'захватывает внимание' },

                    { slang: 'дружелюбно', sentence: 'Они <strong>дружелюбно</strong> встретили нас.', correct: 'приветливо', correctInfo: 'Приветливо — радушно, доброжелательно.', incorrect: ['враждебно', 'холодно', 'зло'], hint: 'радушно' },

                    { slang: 'быстро', sentence: 'Он <strong>быстро</strong> побежал.', correct: 'скоро', correctInfo: 'Скоро — с высокой скоростью, стремительно.', incorrect: ['медленно', 'лениво', 'спокойно'], hint: 'с высокой скоростью' },
                    { slang: 'громко', sentence: 'Они <strong>громко</strong> смеялись.', correct: 'звучно', correctInfo: 'Звучно — с большой громкостью.', incorrect: ['тихо', 'шепотом', 'неслышно'], hint: 'с большой громкостью' },
                    { slang: 'весело', sentence: 'Нам было очень <strong>весело</strong> на празднике.', correct: 'радостно', correctInfo: 'Радостно — испытывая радость, веселье.', incorrect: ['грустно', 'скучно', 'тоскливо'], hint: 'чувство радости' },
                    { slang: 'тихо', sentence: 'В лесу было <strong>тихо</strong> и спокойно.', correct: 'бесшумно', correctInfo: 'Бесшумно — без звуков, тихо.', incorrect: ['громко', 'шумно', 'звонко'], hint: 'отсутствие шума' },
                    { slang: 'светло', sentence: 'В комнате стало <strong>светло</strong>.', correct: 'ярко', correctInfo: 'Ярко — с большим светом.', incorrect: ['темно', 'мрачно', 'серо'], hint: 'много света' },
                    { slang: 'тепло', sentence: 'На солнце очень <strong>тепло</strong>.', correct: 'жарко', correctInfo: 'Жарко — высокая температура.', incorrect: ['холодно', 'морозно', 'прохладно'], hint: 'высокая температура' },
                    { slang: 'свежо', sentence: 'Утром было <strong>свежо</strong> и приятно.', correct: 'прохладно', correctInfo: 'Прохладно — умеренно холодно.', incorrect: ['душно', 'жарко', 'тепло'], hint: 'приятная прохлада' }
                ]
            };

            // ------------------- РАСШИРЕННЫЕ НАБОРЫ ДЛЯ КРОССВОРДА (по 7 слов) ---------------------
            const crosswordPools = {
                young: [
                    { answer: 'КРУТО', clue: 'Превосходно, здорово' },
                    { answer: 'ИМБА', clue: 'Превосходно, круто (сленг)' },
                    { answer: 'РОФЛ', clue: 'Шутка, прикол' },
                    { answer: 'ХАЙП', clue: 'Шумиха, ажиотаж' },
                    { answer: 'КРИНЖ', clue: 'Неловкость, стыд' },
                    { answer: 'ЗАШКВ', clue: 'Позор, стыдная ситуация' },
                    { answer: 'ВАЙБ', clue: 'Атмосфера, настроение' },
                    { answer: 'КРАШ', clue: 'Объект обожания, любовь' },
                    { answer: 'ЧИЛЛ', clue: 'Отдых, расслабление' },
                    { answer: 'ФЛЕКС', clue: 'Хвастовство, демонстрация' },
                    { answer: 'ПРУФ', clue: 'Доказательство, подтверждение' },
                    { answer: 'ТОКСИК', clue: 'Вредный, отравляющий общение' },
                    { answer: 'ИЗИ', clue: 'Легко, без усилий' },
                    { answer: 'ЗАЛИПАТЬ', clue: 'Зависать, проводить время' },
                    { answer: 'ГО', clue: 'Призыв идти, пойдём' },
                    { answer: 'БАЙТ', clue: 'Провокация, ловушка' },
                    { answer: 'КЕК', clue: 'Смешок, усмешка' },
                    { answer: 'ЛОЛ', clue: 'Смешно, интернет-смех' },
                    { answer: 'ХЕЙТ', clue: 'Ненависть, агрессия' },
                    { answer: 'ПОН', clue: 'Понятно, ясно' }
                ],
                simple: [
                    { answer: 'ЗАБАВНО', clue: 'Смешно, вызывает улыбку' },
                    { answer: 'КЛАССНО', clue: 'Очень хорошо, отлично' },
                    { answer: 'МИЛЫЙ', clue: 'Приятный на вид' },
                    { answer: 'НЕЖНО', clue: 'Мягко, с любовью' },
                    { answer: 'ПРИВЕТЛИВО', clue: 'Радушно, доброжелательно' },
                    { answer: 'ВОСХИТИТЕЛЬНО', clue: 'Очень красиво, великолепно' },
                    { answer: 'ПРЕКРАСНО', clue: 'Очень хорошо, красиво' },
                    { answer: 'УВЛЕКАТЕЛЬНО', clue: 'Захватывающе, интересно' },
                    { answer: 'ОПРЯТНО', clue: 'Чисто, аккуратно' },
                    { answer: 'СКОРО', clue: 'Быстро, стремительно' },
                    { answer: 'ЗВУЧНО', clue: 'Громко, звонко' },
                    { answer: 'НЕОЖИДАННО', clue: 'Удивительно, внезапно' },
                    { answer: 'ЧУДЕСНЫЙ', clue: 'Прекрасный, замечательный' },
                    { answer: 'ЗАМЕЧАТЕЛЬНО', clue: 'Очень хорошо, отлично' },
                    { answer: 'РАДОСТНО', clue: 'Весело, радостно' },
                    { answer: 'БЕСШУМНО', clue: 'Тихо, без звука' },
                    { answer: 'ЯРКО', clue: 'Светло, ослепительно' },
                    { answer: 'ЖАРКО', clue: 'Тепло, высокая температура' },
                    { answer: 'ПРОХЛАДНО', clue: 'Свежо, умеренно холодно' },
                    { answer: 'ДУШНО', clue: 'Спёртый воздух, жарко' }
                ]
            };

            // ----------- Состояние ------------
            let currentCategory = 'young'; // young или simple
            let currentQuestions = [];
            let currentIndex = 0;
            let gameActive = true;
            let audioCtx = null;
            let currentCrossword = null;

            // DOM элементы
            const menuScreen = document.getElementById('menu-screen');
            const modeScreen = document.getElementById('mode-screen');
            const gameScreen = document.getElementById('game-screen');
            const crosswordScreen = document.getElementById('crossword-screen');
            
            const btnYoung = document.getElementById('btn-young');
            const btnSimple = document.getElementById('btn-simple');
            const btnBackFromMode = document.getElementById('btn-back-from-mode');
            const btnModeClassic = document.getElementById('btn-mode-classic');
            const btnModeCrossword = document.getElementById('btn-mode-crossword');
            const btnBackFromGame = document.getElementById('btn-back-from-game');
            const btnBackFromCrossword = document.getElementById('btn-back-from-crossword');
            const modeCategoryTitle = document.getElementById('mode-category-title');

            // Классические элементы
            const btnHint = document.getElementById('btn-hint');
            const btnNext = document.getElementById('btn-next');
            const sentenceBox = document.getElementById('sentence-box');
            const optionsContainer = document.getElementById('options-container');
            const infoBox = document.getElementById('info-box');
            const questionCounter = document.getElementById('question-counter');

            // Кроссворд элементы
            const crosswordWordsDiv = document.getElementById('crossword-words');
            const cluesListDiv = document.getElementById('clues-list');
            const btnCheckCrossword = document.getElementById('btn-check-crossword');
            const btnClearCrossword = document.getElementById('btn-clear-crossword');
            const btnHintCrossword = document.getElementById('btn-hint-crossword');
            const crosswordInfo = document.getElementById('crossword-info');

            // ----------- Звуки ----------
            function playSound(isCorrect) {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().then(() => playTone(isCorrect)).catch(e => console.log('аудио блокировка'));
                    } else {
                        playTone(isCorrect);
                    }
                } catch (e) {}
            }

            function playTone(isCorrect) {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                const freq = isCorrect ? 800 : 300;
                const duration = isCorrect ? 0.2 : 0.3;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                osc.start(now);
                osc.stop(now + duration);
                osc.onended = () => osc.disconnect();
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // ----------- Классическая игра ----------
            function renderQuestion() {
                if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
                    sentenceBox.innerHTML = '🎉 Молодец! Все вопросы пройдены.';
                    optionsContainer.innerHTML = '';
                    btnNext.classList.add('hidden');
                    infoBox.textContent = 'Ты ответил на все вопросы! Вернись в меню.';
                    questionCounter.textContent = '✔️ конец';
                    gameActive = false;
                    return;
                }

                const q = currentQuestions[currentIndex];
                sentenceBox.innerHTML = q.sentence;

                const allOptions = [
                    { text: q.correct, info: q.correctInfo || q.correct + ' — синоним.', correct: true },
                    ...q.incorrect.map(inc => ({ text: inc, info: inc, correct: false }))
                ];
                const shuffled = shuffleArray([...allOptions]);

                optionsContainer.innerHTML = '';
                shuffled.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt.text;
                    btn.dataset.text = opt.text;
                    btn.dataset.info = opt.info;
                    btn.dataset.correct = opt.correct;
                    btn.addEventListener('click', optionClickHandler);
                    optionsContainer.appendChild(btn);
                });

                infoBox.textContent = '👆 выбери обычное слово';
                gameActive = true;
                btnNext.classList.add('hidden');
                questionCounter.textContent = `${currentIndex+1} / ${currentQuestions.length}`;
            }

            function optionClickHandler(e) {
                const btn = e.currentTarget;
                if (btn.disabled || !gameActive) return;

                const isCorrect = btn.dataset.correct === 'true';
                const infoText = btn.dataset.info;
                const chosenText = btn.dataset.text;

                playSound(isCorrect);

                if (isCorrect) {
                    infoBox.innerHTML = `✅ <strong>Правильно!</strong> ${infoText}`;
                    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                    gameActive = false;
                    btnNext.classList.remove('hidden');
                } else {
                    infoBox.innerHTML = `❌ <strong>Неверно.</strong> ${infoText}`;
                    btn.disabled = true;
                }
            }

            btnHint.addEventListener('click', () => {
                if (!gameActive || currentQuestions.length === 0 || currentIndex >= currentQuestions.length) {
                    infoBox.textContent = 'Сейчас подсказка не нужна 😉';
                    return;
                }
                const q = currentQuestions[currentIndex];
                infoBox.innerHTML = `💡 <strong>подсказка:</strong> ${q.hint}`;
            });

            btnNext.addEventListener('click', () => {
                if (currentIndex < currentQuestions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    currentIndex++;
                    renderQuestion();
                }
            });

            // ----------- Кроссворд с 7 случайными словами ----------
            function loadCrossword() {
                // Берём пул слов для выбранной категории
                const pool = crosswordPools[currentCategory];
                
                // Перемешиваем пул и берём первые 7 слов
                const shuffledPool = shuffleArray([...pool]);
                const selectedWords = shuffledPool.slice(0, 7); // Теперь 7 слов
                
                // Добавляем каждому слову id для нумерации
                const wordsWithIds = selectedWords.map((word, index) => ({
                    id: index + 1,
                    answer: word.answer,
                    clue: word.clue
                }));
                
                currentCrossword = { words: wordsWithIds };
                renderCrossword();
            }

            function renderCrossword() {
                if (!currentCrossword) return;
                
                const words = currentCrossword.words;
                
                // Отрисовка слов (каждая строка отдельно)
                let wordsHtml = '';
                words.forEach((word, index) => {
                    let rowHtml = `<div class="word-row" data-row="${index}">`;
                    for (let i = 0; i < word.answer.length; i++) {
                        // Добавляем номер в первую клетку
                        const numberHtml = (i === 0) ? `<span class="cell-number">${index + 1}</span>` : '';
                        rowHtml += `
                            <div class="crossword-cell" data-row="${index}" data-col="${i}">
                                ${numberHtml}
                                <input type="text" maxlength="1" data-row="${index}" data-col="${i}" class="crossword-input" value="">
                            </div>
                        `;
                    }
                    rowHtml += '</div>';
                    wordsHtml += rowHtml;
                });
                crosswordWordsDiv.innerHTML = wordsHtml;
                
                // Отрисовка вопросов в панели справа (в том же порядке, что и строки)
                let cluesHtml = '';
                words.forEach((word, index) => {
                    cluesHtml += `
                        <div class="clue-item" data-row="${index}">
                            <span class="clue-number">${index + 1}</span>
                            <span class="clue-text">${word.clue}</span>
                        </div>
                    `;
                });
                cluesListDiv.innerHTML = cluesHtml;
                
                // Добавляем обработчики
                const inputs = document.querySelectorAll('.crossword-input');
                inputs.forEach(input => {
                    input.addEventListener('focus', onInputFocus);
                    input.addEventListener('input', onInputChange);
                    input.addEventListener('keydown', onInputKeyDown);
                });
                
                document.querySelectorAll('.clue-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const row = e.currentTarget.dataset.row;
                        highlightRow(parseInt(row));
                    });
                });
                
                crosswordInfo.innerHTML = '✏️ Вводи буквы — курсор переходит сам';
            }

            function onInputFocus(e) {
                const row = parseInt(e.target.dataset.row);
                highlightRow(row);
            }

            function onInputChange(e) {
                const input = e.target;
                const val = input.value.toUpperCase();
                input.value = val;
                
                // Если ввели букву, переходим к следующей
                if (val.length === 1) {
                    const row = parseInt(input.dataset.row);
                    const col = parseInt(input.dataset.col);
                    const word = currentCrossword.words[row];
                    
                    if (word && col < word.answer.length - 1) {
                        const nextInput = document.querySelector(`.crossword-input[data-row="${row}"][data-col="${col + 1}"]`);
                        if (nextInput) {
                            nextInput.focus();
                        }
                    }
                }
            }

            function onInputKeyDown(e) {
                const input = e.target;
                if (e.key === 'Backspace') {
                    const row = parseInt(input.dataset.row);
                    const col = parseInt(input.dataset.col);
                    
                    // Если поле пустое и это не первая буква
                    if (input.value.length === 0 && col > 0) {
                        const prevInput = document.querySelector(`.crossword-input[data-row="${row}"][data-col="${col - 1}"]`);
                        if (prevInput) {
                            prevInput.focus();
                        }
                    }
                }
            }

            function highlightRow(row) {
                document.querySelectorAll('.crossword-cell').forEach(cell => {
                    cell.classList.remove('highlight');
                });
                document.querySelectorAll(`.crossword-cell[data-row="${row}"]`).forEach(cell => {
                    cell.classList.add('highlight');
                });
            }

            btnCheckCrossword.addEventListener('click', () => {
                if (!currentCrossword) return;
                
                const inputs = document.querySelectorAll('.crossword-input');
                let correct = 0;
                let total = 0;
                
                inputs.forEach(input => {
                    const row = parseInt(input.dataset.row);
                    const col = parseInt(input.dataset.col);
                    const value = input.value.trim().toUpperCase();
                    
                    const word = currentCrossword.words[row];
                    if (word && col < word.answer.length) {
                        const correctLetter = word.answer[col];
                        total++;
                        if (value === correctLetter) {
                            input.style.backgroundColor = '#c0e0c0';
                            correct++;
                        } else {
                            input.style.backgroundColor = '#f0b0b0';
                        }
                    }
                });
                
                if (correct === total) {
                    crosswordInfo.innerHTML = '🎉 Поздравляю! Кроссворд разгадан!';
                    playSound(true);
                } else {
                    crosswordInfo.innerHTML = `✅ Правильных букв: ${correct} из ${total}`;
                    playSound(false);
                }
            });

            btnClearCrossword.addEventListener('click', () => {
                document.querySelectorAll('.crossword-input').forEach(input => {
                    input.value = '';
                    input.style.backgroundColor = '';
                });
                crosswordInfo.innerHTML = '✏️ Поле очищено';
            });

            btnHintCrossword.addEventListener('click', () => {
                const inputs = document.querySelectorAll('.crossword-input');
                const emptyInputs = Array.from(inputs).filter(input => !input.value.trim());
                
                if (emptyInputs.length === 0) {
                    crosswordInfo.innerHTML = '💡 Все клетки уже заполнены!';
                    return;
                }
                
                const randomInput = emptyInputs[Math.floor(Math.random() * emptyInputs.length)];
                const row = parseInt(randomInput.dataset.row);
                const col = parseInt(randomInput.dataset.col);
                
                const word = currentCrossword.words[row];
                if (word && col < word.answer.length) {
                    const correctLetter = word.answer[col];
                    randomInput.value = correctLetter;
                    randomInput.style.backgroundColor = '#e0f0e0';
                    crosswordInfo.innerHTML = `💡 Подсказка: буква "${correctLetter}" в слове ${row+1}`;
                    playSound(true);
                }
            });

            // ----------- Навигация ----------
            function showModeScreen(category) {
                currentCategory = category;
                modeCategoryTitle.textContent = category === 'young' ? 'Молодёжные' : 'Простые';
                menuScreen.classList.add('hidden');
                modeScreen.classList.remove('hidden');
            }

            btnYoung.addEventListener('click', () => showModeScreen('young'));
            btnSimple.addEventListener('click', () => showModeScreen('simple'));

            btnBackFromMode.addEventListener('click', () => {
                modeScreen.classList.add('hidden');
                menuScreen.classList.remove('hidden');
            });

            btnModeClassic.addEventListener('click', () => {
                const baseQuestions = classicData[currentCategory];
                currentQuestions = shuffleArray([...baseQuestions]);
                currentIndex = 0;
                modeScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                renderQuestion();
            });

            btnModeCrossword.addEventListener('click', () => {
                loadCrossword();
                modeScreen.classList.add('hidden');
                crosswordScreen.classList.remove('hidden');
            });

            btnBackFromGame.addEventListener('click', () => {
                gameScreen.classList.add('hidden');
                modeScreen.classList.remove('hidden');
            });

            btnBackFromCrossword.addEventListener('click', () => {
                crosswordScreen.classList.add('hidden');
                modeScreen.classList.remove('hidden');
            });

            // Инициализация аудио
            window.addEventListener('click', function initAudioGesture() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {}
                }
            }, { once: true });
        })();
